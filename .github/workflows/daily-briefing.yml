name: Daily global briefing update

on:
  schedule:
    # 00:30 UTC = 08:30 Asia/Shanghai.
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-global-briefing
  cancel-in-progress: false

jobs:
  update-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate briefing
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ARK_MODEL: ${{ secrets.ARK_MODEL }}
        run: python scripts/update_briefing.py

      - name: Commit and push if changed
        run: |
          git config user.name "daily-briefing-bot"
          git config user.email "actions@github.com"
          git add index.html archive data images
          if git diff --cached --quiet; then
            echo "No briefing changes to commit."
          else
            git commit -m "Update daily global briefing $(date -u +%Y-%m-%d)"
            git push
          fi
